<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sygo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="board-pane" aria-label="Go board">
        <canvas id="go-board" width="960" height="960" aria-label="Interactive Go board"></canvas>
      </section>

      <aside class="side-panel" aria-label="Game controls">
        <header>
          <p class="eyebrow">Sygo</p>
          <h1 id="board-title">Local Board</h1>
        </header>

        <div class="status-grid">
          <div>
            <span>Rules</span>
            <strong>CGOS</strong>
          </div>
          <div>
            <span>Komi</span>
            <strong id="komi-label">7.5</strong>
          </div>
          <div>
            <span>Turn</span>
            <strong id="turn-label">Black</strong>
          </div>
          <div>
            <span>Move</span>
            <strong id="move-count">0</strong>
          </div>
          <div>
            <span>Black captures</span>
            <strong id="black-captures">0</strong>
          </div>
          <div>
            <span>White captures</span>
            <strong id="white-captures">0</strong>
          </div>
        </div>

        <div class="control-group">
          <label for="board-size">Board size</label>
          <select id="board-size">
            <option value="19">19 x 19</option>
            <option value="13">13 x 13</option>
            <option value="9" selected>9 x 9</option>
          </select>
        </div>

        <div class="button-row">
          <button id="pass-button" type="button">Pass</button>
          <button id="undo-button" type="button">Undo</button>
          <button id="reset-button" type="button">Reset</button>
        </div>

        <div class="play-row">
          <button id="play-sygo-button" type="button">Play Sygo</button>
          <button id="stop-play-button" type="button">Stop game</button>
        </div>

        <div class="monitor-row">
          <button id="watch-button" type="button">Watch self-play</button>
          <button id="stop-watch-button" type="button">Stop</button>
          <label for="monitor-worker">Worker</label>
          <select id="monitor-worker">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
          </select>
          <span id="monitor-status">Manual board</span>
        </div>

        <section class="log-panel" aria-label="Move log">
          <div class="log-header">
            <h2>Moves</h2>
            <span id="last-message">Black to play</span>
          </div>
          <ol id="move-log"></ol>
        </section>
      </aside>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
